<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd47a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Transparent background (for use on dark backgrounds) -->

  <!-- Icon mark scaled to 120x120, centered vertically at y=20 -->
  <g transform="translate(20, 20) scale(0.234)">
    <!-- Rounded bg for the mark -->
    <rect width="512" height="512" rx="112" fill="#0c1a2e"/>
    <!-- Outer ring -->
    <circle cx="256" cy="256" r="210" stroke="#f59e0b" stroke-width="1.5" fill="none" opacity="0.15"/>

    <!-- 8-pointed star -->
    <g transform="translate(256,256)">
      <polygon points="0,-160 38,-95 113,-113 95,-38 160,0 95,38 113,113 38,95 0,160 -38,95 -113,113 -95,38 -160,0 -95,-38 -113,-113 -38,-95" fill="#f59e0b" opacity="0.15"/>
      <polygon points="0,-142 34,-84 100,-100 84,-34 142,0 84,34 100,100 34,84 0,142 -34,84 -100,100 -84,34 -142,0 -84,-34 -100,-100 -34,-84" fill="url(#gold)"/>
      <polygon points="0,-66 46,-46 66,0 46,46 0,66 -46,46 -66,0 -46,-46" fill="#0c1a2e" opacity="0.8"/>
      <polygon points="0,-44 11,-26 30,-30 26,-11 44,0 26,11 30,30 11,26 0,44 -11,26 -30,30 -26,11 -44,0 -26,-11 -30,-30 -11,-26" fill="url(#gold)"/>
      <circle r="11" fill="#fcd47a"/>
    </g>
  </g>

  <!-- Wordmark text group -->
  <g transform="translate(148, 0)">
    <!-- Arabic name -->
    <text
      x="0"
      y="72"
      font-family="'Noto Naskh Arabic', 'Traditional Arabic', Georgia, serif"
      font-size="58"
      font-weight="500"
      fill="#f59e0b"
      dominant-baseline="middle"
      direction="rtl"
    >ذِكْرلي</text>

    <!-- Divider -->
    <line x1="2" y1="96" x2="220" y2="96" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>

    <!-- Latin name -->
    <text
      x="2"
      y="122"
      font-family="'Crimson Pro', Georgia, serif"
      font-size="26"
      font-weight="400"
      fill="#f59e0b"
      dominant-baseline="middle"
      letter-spacing="8"
      opacity="0.65"
    >DHIKRLY</text>

    <!-- Tagline -->
    <text
      x="3"
      y="148"
      font-family="'Crimson Pro', Georgia, serif"
      font-size="14"
      font-weight="300"
      fill="#f59e0b"
      dominant-baseline="middle"
      letter-spacing="3"
      opacity="0.35"
    >DAILY ADHKĀR · DU'Ā · ṢALĀH</text>
  </g>
</svg>
