<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <!-- Gold radial glow behind icon -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d4af37" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold linear gradient for main shapes -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0d060"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Subtle green accent gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Icon circle clip -->
    <clipPath id="circleClip">
      <circle cx="80" cy="80" r="58"/>
    </clipPath>
    <!-- Drop shadow filter -->
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#d4af37" flood-opacity="0.25"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="480" height="160" rx="20" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect width="480" height="160" rx="20" fill="none" stroke="#d4af37" stroke-width="0.75" stroke-opacity="0.3"/>

  <!-- Glow halo behind icon -->
  <circle cx="80" cy="80" r="72" fill="url(#glowGrad)"/>

  <!-- Icon circle background -->
  <circle cx="80" cy="80" r="58" fill="rgba(212,175,55,0.08)" stroke="url(#goldGrad)" stroke-width="1.2" filter="url(#iconShadow)"/>

  <!-- ── 8-pointed geometric star (Islamic motif) ── -->
  <!-- Outer star points using overlapping squares rotated 45° -->
  <g transform="translate(80,80)" filter="url(#iconShadow)">
    <!-- Square 1 -->
    <polygon points="0,-28 16.2,-16.2 28,0 16.2,16.2 0,28 -16.2,16.2 -28,0 -16.2,-16.2"
             fill="none" stroke="url(#goldGrad)" stroke-width="1.2" stroke-opacity="0.45"/>
    <!-- Inner ring -->
    <circle r="18" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.3"/>
    <!-- 8 star spokes -->
    <g stroke="url(#goldGrad)" stroke-width="0.8" stroke-opacity="0.35">
      <line x1="0" y1="-18" x2="0" y2="-28"/>
      <line x1="12.7" y1="-12.7" x2="19.8" y2="-19.8"/>
      <line x1="18" y1="0" x2="28" y2="0"/>
      <line x1="12.7" y1="12.7" x2="19.8" y2="19.8"/>
      <line x1="0" y1="18" x2="0" y2="28"/>
      <line x1="-12.7" y1="12.7" x2="-19.8" y2="19.8"/>
      <line x1="-18" y1="0" x2="-28" y2="0"/>
      <line x1="-12.7" y1="-12.7" x2="-19.8" y2="-19.8"/>
    </g>
  </g>

  <!-- ── Crescent moon (main icon) ── -->
  <g transform="translate(80,80)" filter="url(#iconShadow)">
    <!-- Full circle -->
    <circle cx="0" cy="0" r="18" fill="url(#goldGrad)"/>
    <!-- Cutout circle to create crescent -->
    <circle cx="7" cy="-5" r="15" fill="#0d2137"/>
    <!-- Small star inside crescent -->
    <g transform="translate(-3, 6)">
      <polygon points="0,-5 1.2,-1.6 4.8,-1.6 1.9,0.6 3,4 0,2.1 -3,4 -1.9,0.6 -4.8,-1.6 -1.2,-1.6"
               fill="url(#goldGrad)" opacity="0.9"/>
    </g>
  </g>

  <!-- ── Wordmark ── -->
  <!-- Main title -->
  <text x="152" y="68"
        font-family="'Crimson Pro', 'Georgia', serif"
        font-size="32" font-weight="600"
        fill="url(#goldGrad)"
        filter="url(#textShadow)"
        letter-spacing="0.5">
    Daily Adhkār
  </text>

  <!-- Subtitle English -->
  <text x="153" y="93"
        font-family="'Crimson Pro', 'Georgia', serif"
        font-size="14" font-weight="400" font-style="italic"
        fill="rgba(232,220,200,0.6)"
        letter-spacing="0.3">
    &amp; Du'ā Tracker
  </text>

  <!-- Arabic subtitle -->
  <text x="428" y="93"
        font-family="'Scheherazade New', 'Traditional Arabic', serif"
        font-size="18" font-weight="400"
        fill="rgba(212,175,55,0.55)"
        text-anchor="end"
        direction="rtl">
    أَذْكَار يَوْمِيَّة
  </text>

  <!-- Decorative separator line -->
  <line x1="152" y1="100" x2="430" y2="100"
        stroke="url(#goldGrad)" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- XP / gamification tagline -->
  <text x="153" y="118"
        font-family="'Crimson Pro', 'Georgia', serif"
        font-size="11" font-weight="400"
        fill="rgba(16,185,129,0.7)"
        letter-spacing="1.2">
    EARN XP · BUILD STREAKS · COMPLETE YOUR DAILY WIRD
  </text>

  <!-- Bottom-right decorative dot cluster -->
  <g fill="rgba(212,175,55,0.2)">
    <circle cx="448" cy="130" r="2.5"/>
    <circle cx="458" cy="130" r="2.5"/>
    <circle cx="453" cy="122" r="2.5"/>
  </g>
</svg>
