<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="goldF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0d060"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgF)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="url(#goldF)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Inner decorative ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="url(#goldF)" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- ── Crescent moon ── -->
  <g filter="url(#glow)">
    <!-- Full gold circle -->
    <circle cx="32" cy="32" r="14" fill="url(#goldF)"/>
    <!-- Mask circle to carve crescent -->
    <circle cx="37.5" cy="28.5" r="11.5" fill="#0d2137"/>
  </g>

  <!-- ── 4-point star (readable at small sizes) ── -->
  <g transform="translate(22, 38)" filter="url(#glow)">
    <polygon
      points="0,-5.5 1.4,-1.4 5.5,0 1.4,1.4 0,5.5 -1.4,1.4 -5.5,0 -1.4,-1.4"
      fill="url(#goldF)"
      opacity="0.95"/>
  </g>

  <!-- ── 3 small dots (tasbih beads suggestion) ── -->
  <g fill="rgba(212,175,55,0.45)">
    <circle cx="32" cy="56" r="1.5"/>
    <circle cx="37" cy="55" r="1.2"/>
    <circle cx="27" cy="55" r="1.2"/>
  </g>
</svg>
