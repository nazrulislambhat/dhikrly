<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep navy background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#142236"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </radialGradient>
    <!-- Gold gradient for the star -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd47a"/>
      <stop offset="45%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Subtle inner glow for the star -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Rounded rect clip -->
    <clipPath id="round">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle geometric background texture - concentric rings -->
  <g opacity="0.06" stroke="#f59e0b" stroke-width="1" fill="none">
    <circle cx="256" cy="220" r="180"/>
    <circle cx="256" cy="220" r="150"/>
    <circle cx="256" cy="220" r="120"/>
  </g>

  <!-- 8-pointed Islamic star (two overlapping squares, rotated 45°) -->
  <!-- The classic rub el hizb / khatim sulayman motif -->
  <!-- Built from two overlapping rotated squares -->
  <g transform="translate(256, 220)" filter="url(#glow)">

    <!-- Outer 8-pointed star polygon -->
    <!-- Points of an 8-pointed star at radius 148, inner radius 88 -->
    <polygon
      points="
        0,-148
        35,-88
        105,-105
        88,-35
        148,0
        88,35
        105,105
        35,88
        0,148
        -35,88
        -105,105
        -88,35
        -148,0
        -88,-35
        -105,-105
        -35,-88
      "
      fill="url(#gold)"
      opacity="0.18"
    />

    <!-- Main 8-pointed star - solid -->
    <polygon
      points="
        0,-132
        31,-78
        94,-94
        78,-31
        132,0
        78,31
        94,94
        31,78
        0,132
        -31,78
        -94,94
        -78,31
        -132,0
        -78,-31
        -94,-94
        -31,-78
      "
      fill="url(#gold)"
    />

    <!-- Inner octagon cutout for depth -->
    <polygon
      points="
        0,-62
        44,-44
        62,0
        44,44
        0,62
        -44,44
        -62,0
        -44,-44
      "
      fill="#0e1c2e"
      opacity="0.7"
    />

    <!-- Small inner star -->
    <polygon
      points="
        0,-42
        10,-24
        28,-28
        24,-10
        42,0
        24,10
        28,28
        10,24
        0,42
        -10,24
        -28,28
        -24,10
        -42,0
        -24,-10
        -28,-28
        -10,-24
      "
      fill="url(#gold)"
      opacity="0.9"
    />

    <!-- Center dot -->
    <circle cx="0" cy="0" r="10" fill="#fcd47a"/>

  </g>

  <!-- Wordmark: ذِكْرلي  -->
  <text
    x="256"
    y="398"
    font-family="'Noto Naskh Arabic', 'Traditional Arabic', Georgia, serif"
    font-size="52"
    font-weight="500"
    fill="#f59e0b"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="1"
    direction="rtl"
  >ذِكْرلي</text>

  <!-- Thin divider line under Arabic -->
  <line x1="176" y1="418" x2="336" y2="418" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>

  <!-- Latin subtitle -->
  <text
    x="256"
    y="446"
    font-family="'Crimson Pro', Georgia, serif"
    font-size="22"
    font-weight="400"
    fill="#f59e0b"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="5"
    opacity="0.7"
  >DHIKRLY</text>
</svg>
